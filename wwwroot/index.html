<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asteroids Neon - Jogo Espacial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>✦ ASTEROIDS NEON ✦</h1>
            <div class="hud">
                <div class="score-box">
                    <span class="label">PONTUAÇÃO</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="ranking-box">
                    <span class="label">TOP 5</span>
                    <div id="rankingList" class="ranking-list">
                        <div class="ranking-placeholder">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="900" height="600"></canvas>
        </div>
        
        <div class="controls-info">
            <div class="control-key">←</div>
            <span>Girar Esquerda</span>
            <div class="control-key">→</div>
            <span>Girar Direita</span>
            <div class="control-key">↑</div>
            <span>Acelerar</span>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content neon-glow">
            <h2>💀 GAME OVER 💀</h2>
            <div class="final-score">
                <span>Sua Pontuação:</span>
                <span id="finalScore">0</span>
            </div>
            <div class="player-name-input">
                <input type="text" id="playerName" maxlength="20" placeholder="Digite seu nome" autocomplete="off">
            </div>
            <button id="restartBtn" class="neon-button">🚀 REINICIAR JOGO</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
